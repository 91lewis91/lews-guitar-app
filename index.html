<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Guitar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">

    <!-- ===== TUNER VIEW ===== -->
    <div id="view-tuner" class="view">
      <div class="tuner-title">&#9834; <span>Tuner</span></div>

      <!-- Gauge -->
      <div class="tuner-gauge-wrapper">
        <svg class="tuner-gauge-arc" viewBox="0 0 280 160" xmlns="http://www.w3.org/2000/svg">
          <!-- Background arc -->
          <path d="M 20 150 A 120 120 0 0 1 260 150" fill="none" stroke="#252438" stroke-width="12" stroke-linecap="round"/>
          <!-- Coloured zones -->
          <path d="M 20 150 A 120 120 0 0 1 80 50"  fill="none" stroke="#ff4d4d33" stroke-width="10" stroke-linecap="round"/>
          <path d="M 200 50 A 120 120 0 0 1 260 150" fill="none" stroke="#ff4d4d33" stroke-width="10" stroke-linecap="round"/>
          <path d="M 80 50 A 120 120 0 0 1 140 30"   fill="none" stroke="#e8c54733" stroke-width="10" stroke-linecap="round"/>
          <path d="M 140 30 A 120 120 0 0 1 200 50"  fill="none" stroke="#e8c54733" stroke-width="10" stroke-linecap="round"/>
          <!-- Centre green zone -->
          <path d="M 125 31 A 120 120 0 0 1 155 31"  fill="none" stroke="#2cb67d55" stroke-width="12" stroke-linecap="round"/>
          <!-- Tick marks -->
          <line x1="20"  y1="150" x2="28"  y2="150" stroke="#3a3856" stroke-width="2"/>
          <line x1="260" y1="150" x2="252" y2="150" stroke="#3a3856" stroke-width="2"/>
          <line x1="140" y1="30"  x2="140" y2="38"  stroke="#3a3856" stroke-width="2"/>
          <line x1="72"  y1="62"  x2="78"  y2="68"  stroke="#3a3856" stroke-width="2"/>
          <line x1="208" y1="62"  x2="202" y2="68"  stroke="#3a3856" stroke-width="2"/>
          <!-- Labels -->
          <text x="10"  y="155" fill="#a7a9be" font-size="10" text-anchor="middle">♭</text>
          <text x="270" y="155" fill="#a7a9be" font-size="10" text-anchor="middle">♯</text>
          <text x="140" y="22"  fill="#2cb67d" font-size="10" text-anchor="middle">✓</text>
        </svg>
        <!-- Needle -->
        <div id="tuner-needle"></div>
        <div class="tuner-pivot"></div>
      </div>

      <!-- Note display -->
      <div class="tuner-note-display">
        <div id="tuner-note" class="tuner-note">—</div>
        <div id="tuner-cents"></div>
        <div id="tuner-freq"></div>
      </div>

      <!-- String indicators (low E to high e) -->
      <div class="tuner-strings">
        <div class="string-dot" data-string="6">
          <div class="string-dot-circle">E</div>
          <div class="string-dot-label">82Hz</div>
        </div>
        <div class="string-dot" data-string="5">
          <div class="string-dot-circle">A</div>
          <div class="string-dot-label">110Hz</div>
        </div>
        <div class="string-dot" data-string="4">
          <div class="string-dot-circle">D</div>
          <div class="string-dot-label">147Hz</div>
        </div>
        <div class="string-dot" data-string="3">
          <div class="string-dot-circle">G</div>
          <div class="string-dot-label">196Hz</div>
        </div>
        <div class="string-dot" data-string="2">
          <div class="string-dot-circle">B</div>
          <div class="string-dot-label">247Hz</div>
        </div>
        <div class="string-dot" data-string="1">
          <div class="string-dot-circle">e</div>
          <div class="string-dot-label">330Hz</div>
        </div>
      </div>

      <!-- Start button -->
      <div class="tuner-btn-row">
        <button id="tuner-start-btn">Start Tuner</button>
      </div>
      <div id="tuner-status" class="tuner-status">Tap the button to start tuning</div>

      <!-- Hint -->
      <p class="tuner-hint">
        Pluck a string and tune until the needle centres and the note turns <strong>green</strong>.
        Standard tuning: <strong>E A D G B e</strong> (thickest to thinnest).
      </p>
    </div>

    <!-- ===== SONGS VIEW ===== -->
    <div id="view-songs" class="view hidden">
      <div class="songs-add-area">
        <h2>&#9834; <span>My Songs</span></h2>
        <form id="add-song-form">
          <div class="url-input-row">
            <input type="url" id="song-url-input"
              placeholder="Paste YouTube or Spotify URL..."
              autocomplete="off" autocorrect="off" autocapitalize="off">
            <button type="submit">Add</button>
          </div>
          <div id="add-song-feedback" class="form-feedback"></div>
        </form>
      </div>
      <div id="song-list"></div>
    </div>

    <!-- ===== LEARN VIEW ===== -->
    <div id="view-learn" class="view hidden">
      <!-- Populated dynamically by teacher.js -->
      <div style="padding:32px 16px; color: var(--text-secondary); text-align:center;">
        Select a song from <strong>Songs</strong> to start learning.
      </div>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="tuner">
        <span class="nav-icon">🎸</span>
        Tuner
      </button>
      <button class="nav-btn" data-view="songs">
        <span class="nav-icon">♪</span>
        Songs
      </button>
      <button class="nav-btn" data-view="learn">
        <span class="nav-icon">📖</span>
        Learn
      </button>
    </nav>

  </div>

  <script src="js/chords.js"></script>
  <script src="js/tuner.js"></script>
  <script src="js/songs.js"></script>
  <script src="js/teacher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
